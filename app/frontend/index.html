<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hotel Management System</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f6f8;
        color: #1f2937;
      }
      .container {
        max-width: 720px;
        margin: 40px auto;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        padding: 24px;
      }
      .status {
        margin-top: 12px;
        padding: 10px;
        border-radius: 8px;
        font-weight: bold;
      }
      .ok {
        background: #dcfce7;
        color: #166534;
      }
      .error {
        background: #fee2e2;
        color: #991b1b;
      }
      code {
        background: #f3f4f6;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Hotel Management System</h1>
      <p>Frontend is running with Vite.</p>
      <p id="backend-url"></p>
      <div id="health" class="status">Checking backend...</div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
